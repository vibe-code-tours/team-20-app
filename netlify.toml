[build]
  base = "app"
  command = "npm ci --legacy-peer-deps && cd packages/server && npx prisma generate && cd ../client && npm run build"
  functions = "packages/server/netlify/functions"
  publish = "packages/client/dist"

[functions]
  node_bundler = "esbuild"
  included_files = ["packages/server/prompts/**"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/server/:splat"
  status = 200

# SPA fallback - serve index.html for all client-side routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
